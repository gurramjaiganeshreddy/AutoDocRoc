services:
  # 1. Backend Express Server
  - type: web
    name: autodoc-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000

  # 2. Frontend React Client (Static Site)
  - type: static
    name: autodoc-frontend
    rootDir: client
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: autodoc-backend
          property: host
